<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tower System Pro">
<meta name="theme-color" content="#1A1A1A">
<title>Tower System Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#1A1A1A;font-family:Arial,sans-serif;}
.pg{display:none;flex-direction:column;min-height:100vh;}
.pg.on{display:flex;}
.bar{background:#1A1A1A;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.bar img{height:24px;}
.bar .tit{color:#F5C800;font-size:13px;font-weight:700;flex:1;text-align:center;}
.bar .bk{color:#F5C800;font-size:24px;cursor:pointer;padding:0 6px;}
.bar .dr{color:rgba(255,255,255,0.4);font-size:11px;}
.bod{flex:1;background:#F0EEE8;padding:14px;overflow-y:auto;}
.lbl{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cd{background:white;border-radius:12px;padding:14px;border:2px solid #F5C800;cursor:pointer;position:relative;overflow:hidden;}
.cd .tp{position:absolute;top:0;left:0;right:0;height:4px;background:#F5C800;}
.cd .ic{font-size:28px;margin-bottom:8px;}
.cd .nm{font-size:12px;font-weight:700;color:#1A1A1A;line-height:1.3;}
.cd .sb{font-size:10px;color:#888;margin-top:3px;}
.sc{background:#1A1A1A;border-radius:7px;padding:7px 12px;margin:14px 0 8px;display:flex;gap:8px;align-items:center;}
.sn{color:#F5C800;font-size:11px;font-weight:800;}
.st{color:white;font-size:9px;font-weight:700;text-transform:uppercase;}
.fg{margin-bottom:10px;}
.fl{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:5px;}
.fi{width:100%;background:white;border:2px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Arial;color:#1A1A1A;}
.fi:focus{border-color:#F5C800;outline:none;}
textarea.fi{min-height:80px;resize:none;line-height:1.4;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.ckb{background:white;border:2px solid #ddd;border-radius:8px;padding:10px 12px;}
.ckt{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;margin-bottom:8px;}
.ckr{display:flex;flex-wrap:wrap;gap:6px;}
.ch{padding:7px 12px;border-radius:20px;font-size:11px;font-weight:600;border:2px solid #ddd;background:white;cursor:pointer;display:inline-block;}
.ch.on{background:#1A1A1A;border-color:#1A1A1A;color:#F5C800;}
.sp{display:flex;align-items:center;background:white;border:2px solid #ddd;border-radius:8px;overflow:hidden;}
.sb2{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;background:#f0f0f0;border:none;cursor:pointer;flex-shrink:0;color:#1A1A1A;}
.sv{flex:1;text-align:center;font-size:16px;font-weight:700;color:#1A1A1A;}
.htb{background:#1A1A1A;border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.htl{color:rgba(255,255,255,0.5);font-size:10px;font-weight:700;text-transform:uppercase;}
.htn{color:rgba(255,255,255,0.3);font-size:10px;margin-top:2px;}
.htv{color:#F5C800;font-size:20px;font-weight:800;}
.btn{width:100%;background:#F5C800;color:#1A1A1A;border:none;border-radius:10px;padding:16px;font-size:15px;font-weight:900;cursor:pointer;margin-top:14px;font-family:Arial;}
.ok{background:#1A1A1A;padding:40px 24px;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ok .ic2{font-size:60px;margin-bottom:16px;}
.ok h2{color:#F5C800;font-size:22px;font-weight:800;margin-bottom:10px;}
.ok p{color:rgba(255,255,255,0.5);font-size:13px;line-height:1.6;margin-bottom:6px;}
.ok .em{color:rgba(255,255,255,0.25);font-size:11px;margin-bottom:30px;}
.ok button{background:#F5C800;color:#1A1A1A;border:none;border-radius:10px;padding:14px 32px;font-size:15px;font-weight:900;cursor:pointer;font-family:Arial;}
</style>
</head>

function sh(id){
  document.querySelectorAll('.pg').forEach(function(e){e.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}

document.getElementById('bk').addEventListener('click',function(){sh('pH');});
document.getElementById('retour').addEventListener('click',function(){sh('pH');});

document.getElementById('c2').addEventListener('click',function(){of(2);});
document.getElementById('c3').addEventListener('click',function(){of(3);});

function tc(el){el.classList.toggle('on');}
function cks(g){var r=[];document.querySelectorAll('[data-g="'+g+'"].on').forEach(function(e){r.push(e.textContent);});return r.length?r.join(', '):'---';}
function nc(id,d,mn){N[id]=Math.max(mn,parseFloat((N[id]+d).toFixed(1)));document.getElementById('n'+id).textContent=N[id];if(id==='ht'){var e=document.getElementById('htv');if(e)e.textContent=(N[id]+2).toFixed(1)+' m';}}
function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function inp(id,lb,ph,tp){return '<div class="fg"><div class="fl">'+lb+'</div><input class="fi" id="'+id+'" type="'+(tp||'text')+'" placeholder="'+ph+'"></div>';}
function txa(id,lb,ph){return '<div class="fg"><div class="fl">'+lb+'</div><textarea class="fi" id="'+id+'" placeholder="'+ph+'"></textarea></div>';}
function sec(n,t){return '<div class="sc"><span class="sn">'+n+'.</span><span class="st">'+t+'</span></div>';}
function ckg(g,lb,items){return '<div class="fg"><div class="ckb"><div class="ckt">'+lb+'</div><div class="ckr">'+items.map(function(i){return '<span class="ch" onclick="tc(this)" data-g="'+g+'">'+i+'</span>';}).join('')+'</div></div></div>';}
function stp(id,v,s,mn){N[id]=v;return '<div class="sp"><button class="sb2" onclick="nc(''+id+'',-'+s+','+mn+')">-</button><div class="sv" id="n'+id+'">'+v+'</div><button class="sb2" onclick="nc(''+id+'','+s+','+mn+')">+</button></div>';}

}
